name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_URL: https://api.aduanefie.org
      NEXT_PUBLIC_API_HOSTNAME: api.aduanefie.org
      NEXT_PUBLIC_STORAGE_HOSTNAME: aduanefie.s3.amazonaws.com
      NEXT_PUBLIC_WEBSITE_URL: https://aduanefie.org
      NEXT_PUBLIC_ADMIN_PANEL_URL: https://admin.aduanefie.org
      NEXT_PUBLIC_PROTOCOL: https
      NEXT_PUBLIC_META_TITLE: Aduanefie
      NEXT_PUBLIC_META_DESCRIPTION: Agricultural Produce Marketplace
      NEXT_PUBLIC_META_IMAGE: https://aduanefie.org/images/brand_logo.svg
      NEXT_PUBLIC_META_KEYWORDS: Farm
      NEXT_PUBLIC_DEFAULT_LANGUAGE: en
      NEXT_PUBLIC_CUSTOM_PHONE_SINGUP: "false"
      NEXT_PUBLIC_DEFAULT_LOCATION: 38.9120424,-77.035308
      NEXT_PUBLIC_DYNAMIC_LINK_DOMAIN: YOUR_DYNAMIC_LINK_DOMAIN
      NEXT_PUBLIC_DYNAMIC_LINK_ANDROID_PACKAGE_NAME: YOUR_DYNAMIC_LINK_ANDROID_PACKAGE_NAME
      NEXT_PUBLIC_DYNAMIC_LINK_IOS_BUNDLE_ID: YOUR_DYNAMIC_LINK_IOS_BUNDLE_ID
      NEXT_PUBLIC_LOGO: https://aduanefie.org/images/brand_logo.png
      NEXT_PUBLIC_LOGO_DARK: https://aduanefie.org/images/brand_logo_dark.png
      NEXT_PUBLIC_LOGO_ROUNDED: https://aduanefie.org/images/brand_logo_rounded.png
      NEXT_PUBLIC_MAP_API_KEY: YOUR_MAP_API_KEY
      NEXT_PUBLIC_GOOGLE_MEASUREMENT_ID: YOUR_GOOGLE_MEASUREMENT_ID
      NEXT_PUBLIC_FIREBASE_API_KEY: YOUR_FIREBASE_API_KEY
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: YOUR_FIREBASE_AUTH_DOMAIN
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: YOUR_FIREBASE_PROJECT_ID
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: YOUR_FIREBASE_STORAGE_BUCKET
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: YOUR_FIREBASE_MESSAGING_SENDER_ID
      NEXT_PUBLIC_FIREBASE_APP_ID: YOUR_FIREBASE_APP_ID
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: YOUR_FIREBASE_MEASUREMENT_ID
      NEXT_PUBLIC_FIREBASE_VAPID_KEY: YOUR_FIREBASE_VAPID_KEY
      NEXT_PUBLIC_FIREBASE_WEB_KEY: YOUR_FIREBASE_WEB_KEY
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Cache next.js build
        uses: actions/cache@v4
        with:
          path: apps/website/.next/cache
          key: next-${{ runner.os }}-${{ hashFiles('apps/website/**/*.{ts,tsx,js,jsx,scss}') }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build website
        working-directory: apps/website
        run: |
          npx next build 2>&1 | tee /tmp/next-build.log
          exit_code=${PIPESTATUS[0]}
          if [ $exit_code -ne 0 ]; then
            echo "## Build failed with exit code $exit_code" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -80 /tmp/next-build.log >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit $exit_code
          fi
